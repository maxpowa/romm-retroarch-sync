name: Build Windows Executable

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        conda-channels: conda-forge
        use-only-tar-bz2: true
        auto-activate-base: false
    
    - name: Install GTK4 and dependencies
      shell: bash -l {0}
      run: |
        conda install -c conda-forge gtk=4 libadwaita pygobject -y
        pip install -r requirements-build.txt
    
    - name: Verify GTK4
      shell: bash -l {0}
      run: |
        pkg-config --modversion gtk+-4.0
        python -c "import gi; gi.require_version('Gtk', '4.0'); from gi.repository import Gtk; print('GTK4 import successful')"
    
    - name: Build Windows executable
      shell: bash -l {0}
      run: |
        python scripts/build_windows.py
    
    - name: List build output
      shell: powershell
      run: |
        Get-ChildItem -Path "dist\" -Recurse
    
    - name: Upload executable artifact
      uses: actions/upload-artifact@v3
      with:
        name: RomM-RetroArch-Sync-windows
        path: dist/RomM-RetroArch-Sync.exe
        retention-days: 30
    
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: |
          build/
          dist/
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: RomM-RetroArch-Sync-windows
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: RomM-RetroArch-Sync.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
